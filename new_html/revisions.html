    <script>

            return d;
        }
        $('#main_table').DataTable({
            stateSave: true,
            paging: false,
            info: false,
            searching: false,
            ajax: {
                url: '/revisions_api.php',
                data: getFormData,
                dataSrc: function (json) {
                    return json.results;
                }
            },
            columns: [
                {
                    data: null,
                    title: '#',
                    render: function (data, type, row, meta) {

                    },
